user niean staff;
worker_processes 1;

error_log /Users/niean/install/nginx/logs/error.log warn;
pid       /Users/niean/install/nginx/logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /Users/niean/install/nginx/logs/access.log;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # 默认首页重定向到 Assistant
        location = / {
            return 302 /assistant/;
        }

        # 共享静态资源
        location = /shared-nav.js {
            root /Users/niean/install/nginx/html;
        }

        # Assistant 静态资源
        location = /assistant/favicon.svg {
            alias /Users/niean/install/assistant/favicon.svg;
        }

        # Assistant API（长前缀优先）
        location /assistant/api/ {
            proxy_pass http://127.0.0.1:8090/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Assistant Dashboard
        location /assistant/ {
            proxy_pass http://127.0.0.1:8090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Locals 静态服务
        location /locals/ {
            alias /Users/niean/install/locals/;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}
